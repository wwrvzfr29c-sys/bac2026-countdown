<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🇩🇿 BAC 2026 Results Countdown</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#006233,#0b1220);
color:white;
overflow:hidden;
}

.card{
width:90%;
max-width:800px;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

h1{
font-size:3rem;
margin-bottom:10px;
}

h2{
font-weight:400;
opacity:.9;
margin-bottom:25px;
}

.ar{
font-size:1.3rem;
margin-bottom:30px;
direction:rtl;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin:35px 0;
}

.box{
background:rgba(255,255,255,.12);
padding:20px;
border-radius:20px;
transition:.3s;
}

.box:hover{
transform:translateY(-5px);
}

.number{
font-size:3rem;
font-weight:bold;
display:block;
}

.label{
opacity:.8;
margin-top:8px;
}

.date{
font-size:1.1rem;
margin-top:20px;
line-height:1.8;
}

button{
margin-top:35px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:999px;
cursor:pointer;
background:white;
color:#006233;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

footer{
margin-top:30px;
opacity:.8;
}

@media(max-width:700px){

.countdown{
grid-template-columns:repeat(2,1fr);
}

h1{
font-size:2.2rem;
}

.number{
font-size:2.4rem;
}

}
</style>

</head>

<body>

<div class="card">

<h1>🇩🇿 BAC 2026</h1>

<h2>Official Results Countdown</h2>

<div class="ar">
الموعد الرسمي لإعلان نتائج شهادة البكالوريا 2026
</div>

<div class="countdown">

<div class="box">
<span id="days" class="number">00</span>
<div class="label">Days</div>
</div>

<div class="box">
<span id="hours" class="number">00</span>
<div class="label">Hours</div>
</div>

<div class="box">
<span id="minutes" class="number">00</span>
<div class="label">Minutes</div>
</div>

<div class="box">
<span id="seconds" class="number">00</span>
<div class="label">Seconds</div>
</div>

</div>

<div class="date">
📅 Sunday, 12 July 2026<br>
🕙 10:00 AM (Algeria)
</div>

<button onclick="shareSite()">📤 Share Countdown</button>

<footer>
Good luck to all BAC candidates ❤️
</footer>

</div>

<script>

const target=new Date("2026-07-12T10:00:00+01:00");

function update(){

const now=new Date();

const diff=target-now;

if(diff<=0){

document.body.innerHTML="<h1 style='font-size:50px;text-align:center'>🎉 Results are out!<br>Good luck everyone 🇩🇿❤️</h1>";

return;

}

document.getElementById("days").textContent=Math.floor(diff/86400000);

document.getElementById("hours").textContent=Math.floor(diff%86400000/3600000);

document.getElementById("minutes").textContent=Math.floor(diff%3600000/60000);

document.getElementById("seconds").textContent=Math.floor(diff%60000/1000);

}

setInterval(update,1000);

update();

function shareSite(){

if(navigator.share){

navigator.share({
title:"BAC 2026 Countdown",
text:"Countdown to the official BAC 2026 results!",
url:location.href
});

}else{

navigator.clipboard.writeText(location.href);
alert("Link copied!");

}

}

</script>

</body>
</html>
