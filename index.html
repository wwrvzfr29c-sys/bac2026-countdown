<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BAC 2026 Countdown 🇩🇿</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

<h1>🇩🇿 BAC 2026</h1>

<h2>Official Results Countdown</h2>

<p class="arabic">
الموعد الرسمي لإعلان نتائج شهادة البكالوريا 2026
</p>

<div class="countdown">

<div class="card">
<span id="days">00</span>
<small>Days</small>
</div>

<div class="card">
<span id="hours">00</span>
<small>Hours</small>
</div>

<div class="card">
<span id="minutes">00</span>
<small>Minutes</small>
</div>

<div class="card">
<span id="seconds">00</span>
<small>Seconds</small>
</div>

</div>

<div class="date">
📅 Sunday, 12 July 2026<br>
🕙 10:00 AM (Algeria)
</div>

<button id="share">
📤 Share Countdown
</button>

<footer>
Good luck to all BAC candidates ❤️
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
